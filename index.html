        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('content-container');

        // Sayfa yüklendiğinde sekmeleri ve içerikleri oluştur
        function renderApp() {
            gamesData.forEach((game, index) => {
                // Tab Butonunu Oluştur
                const btn = document.createElement('button');
                btn.className = `tab-btn whitespace-nowrap md:whitespace-normal text-left px-4 py-3 rounded-lg font-medium text-sm transition-colors duration-200 border-l-4 focus:outline-none ${index === 0 ? 'bg-gray-800 border-green-400 text-green-400 shadow-md' : 'bg-transparent border-transparent text-gray-400 hover:bg-gray-800 hover:text-gray-200'}`;
                btn.innerText = game.title;
                btn.onclick = () => showTab(game.id, btn);
                tabsContainer.appendChild(btn);

                // İçerik Kutusunu Oluştur
                const section = document.createElement('section');
                section.id = game.id;
                section.className = `tab-content max-w-4xl mx-auto ${index === 0 ? 'block' : 'hidden'}`;
                
                // Başlık ve Kod bloğu şablonu
                section.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-3xl font-extrabold text-white mb-2">${game.title}</h2>
                        <p class="text-gray-400">Blokları Scratch'e taşımak için aşağıdaki kodları referans alabilirsin.</p>
                    </div>
                    <div class="bg-gray-950 p-6 rounded-xl border border-gray-700 shadow-2xl relative">
                        <div class="absolute top-0 left-0 w-full h-8 bg-gray-800 rounded-t-xl border-b border-gray-700 flex items-center px-4 gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500"></div>
                            <span class="text-xs text-gray-400 ml-2 font-mono">scratch_blocks.txt</span>
                        </div>
                        <pre class="mt-6 text-green-300 text-sm md:text-base leading-relaxed overflow-x-auto"><code>${game.content}</code></pre>
                    </div>
                `;
                contentContainer.appendChild(section);
            });
        }

        // Sekme Değiştirme Mantığı
        function showTab(tabId, clickedBtn) {
            // Tüm içerikleri gizle
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
                content.classList.remove('block');
            });
            // Tüm butonların aktif stilini sıfırla
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn whitespace-nowrap md:whitespace-normal text-left px-4 py-3 rounded-lg font-medium text-sm transition-colors duration-200 border-l-4 focus:outline-none bg-transparent border-transparent text-gray-400 hover:bg-gray-800 hover:text-gray-200';
            });

            // Seçilen içeriği göster
            const activeContent = document.getElementById(tabId);
            activeContent.classList.remove('hidden');
            activeContent.classList.add('block');
            
            // Tıklanan butonu aktif yap
            clickedBtn.className = 'tab-btn whitespace-nowrap md:whitespace-normal text-left px-4 py-3 rounded-lg font-medium text-sm transition-colors duration-200 border-l-4 focus:outline-none bg-gray-800 border-green-400 text-green-400 shadow-md';
        }

        // Uygulamayı Başlat
        renderApp();
    </script>
